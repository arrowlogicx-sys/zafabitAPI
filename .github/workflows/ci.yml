name: Zaffabit Backend CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Admin & Core Tests
        run: npm test

      - name: Run Maid Tests
        run: npm run test:maid

      - name: Run E2E Flow Tests
        run: npm run test:e2e
